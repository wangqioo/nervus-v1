networks:
  nervus-net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.20.0.0/24
services:
  app-calendar:
    build:
      context: .
      dockerfile: apps/calendar/Dockerfile
    container_name: nervus-app-calendar
    depends_on:
    - arbor-core
    entrypoint: []
    environment:
      APP_PORT: 8011
      ARBOR_URL: http://nervus-arbor:8090
      DB_PATH: /data/calendar.db
      NATS_URL: nats://nervus-nats:4222
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
      REDIS_URL: redis://nervus-redis:6379
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8011/health
      timeout: 10s
    networks:
      nervus-net: null
    ports:
    - 8011:8011
    restart: unless-stopped
    volumes:
    - calendar-data:/data
    image: nervus-app-calendar:latest
  app-calorie-tracker:
    build:
      context: .
      dockerfile: apps/calorie-tracker/Dockerfile
