    image: nervus-app-video-transcriber:latest
  app-workflow-viewer:
    build:
      context: .
      dockerfile: apps/workflow-viewer/Dockerfile
    container_name: nervus-app-workflow
    depends_on:
    - arbor-core
    entrypoint: []
    environment:
      APP_PORT: 8014
      ARBOR_URL: http://nervus-arbor:8090
      NATS_URL: nats://nervus-nats:4222
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
      REDIS_URL: redis://nervus-redis:6379
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8014/health
      timeout: 10s
    networks:
      nervus-net: null
    ports:
    - 8014:8014
    restart: unless-stopped
    image: nervus-app-workflow-viewer:latest
  arbor-core:
    build:
      context: ./core/arbor
      dockerfile: Dockerfile
    container_name: nervus-arbor
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    environment:
      LOG_LEVEL: info
      NATS_URL: nats://nervus-nats:4222
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
      REDIS_URL: redis://nervus-redis:6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8090/health
      timeout: 10s
    networks:
      nervus-net: null
    ports:
    - 8090:8090
    restart: unless-stopped
    volumes:
    - ./core/arbor:/srv/arbor:ro      # hot-reload: restart arbor-core to pick up changes
    - ./config:/app/config:ro         # models.json, flows/, public.json
    image: nervus-arbor-core:latest
  nats:
    command:
    - -c
    - /etc/nats/nats-server.conf
    container_name: nervus-nats
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - nats-server
      - --version
      timeout: 5s
    image: nats:2.10-alpine
    networks:
      nervus-net: null
    ports:
    - 4222:4222
    - 8222:8222
    restart: unless-stopped
    volumes:
    - nats-data:/data
    - ./core/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
  postgres:
    container_name: nervus-postgres
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: nervus
      POSTGRES_PASSWORD: nervus_secret
      POSTGRES_USER: nervus
    healthcheck:
      interval: 10s
      retries: 10
      test:
      - CMD-SHELL
      - pg_isready -U nervus -d nervus
      timeout: 5s
    image: nervus-pgvector:pg16
    networks:
      nervus-net: null
    ports:
    - 5432:5432
    restart: unless-stopped
    volumes:
    - postgres-data:/var/lib/postgresql/data
    - ./core/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  redis:
    command:
    - redis-server
    - /etc/redis/redis.conf
    container_name: nervus-redis
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - redis-cli
      - ping
      timeout: 3s
    image: redis:7-alpine
    networks:
      nervus-net: null
    ports:
    - 6379:6379
    restart: unless-stopped
    volumes:
    - redis-data:/data
    - ./core/redis/redis.conf:/etc/redis/redis.conf:ro
  app-file-manager:
    build:
      context: .
      dockerfile: apps/file-manager/Dockerfile
    image: nervus-app-file-manager:latest
    container_name: nervus-app-files
    entrypoint: []
    depends_on:
      - arbor-core
    environment:
      APP_PORT: "8015"
      APP_INTERNAL_URL: "http://nervus-app-files:8015"
      NATS_URL: nats://nervus-nats:4222
      REDIS_URL: redis://nervus-redis:6379
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
      ARBOR_URL: http://nervus-arbor:8090
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      LINKBOX_API_URL: ${LINKBOX_API_URL:-}
      LINKBOX_API_KEY: ${LINKBOX_API_KEY:-}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD
      - python3
      - -c
      - "import urllib.request; urllib.request.urlopen('http://localhost:8015/health', timeout=5)"
      timeout: 10s
    networks:
      nervus-net: null
    ports:
    - 8015:8015
    restart: unless-stopped
    volumes:
    - files-data:/app/data/files
  app-model-manager:
    build:
      context: .
      dockerfile: apps/model-manager/Dockerfile
    image: nervus-app-model-manager:latest
    container_name: nervus-app-model-manager
    entrypoint: []
    depends_on:
      - arbor-core
    environment:
      APP_PORT: "8016"
      APP_INTERNAL_URL: "http://nervus-app-model-manager:8016"
      NATS_URL: nats://nervus-nats:4222
      REDIS_URL: redis://nervus-redis:6379
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
      ARBOR_URL: http://nervus-arbor:8090
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD
      - python3
      - -c
      - "import urllib.request; urllib.request.urlopen('http://localhost:8016/', timeout=5)"
      timeout: 10s
    networks:
      nervus-net: null
    ports:
    - 8016:8016
    restart: unless-stopped
    volumes:
    - ./apps/model-manager/index.html:/app/index.html:ro   # hot-reload: no rebuild needed
volumes:
  calendar-data: null
  nats-data: null
  notes-data: null
  pdf-data: null
  postgres-data: null
  redis-data: null
  reminder-data: null
  rss-data: null
  status-sense-data: null
  video-data: null
  files-data: null
