      context: .
      dockerfile: apps/rss-reader/Dockerfile
    container_name: nervus-app-rss
    depends_on:
    - arbor-core
    entrypoint: []
    environment:
      APP_PORT: 8010
      ARBOR_URL: http://nervus-arbor:8090
      DB_PATH: /data/rss-reader.db
      FETCH_INTERVAL: 3600
      NATS_URL: nats://nervus-nats:4222
      POSTGRES_URL: postgresql://nervus:nervus_secret@nervus-postgres:5432/nervus?sslmode=disable
