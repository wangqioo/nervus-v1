<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>模型管理</title>
<style>
  :root {
    --bg: #f5f5f7; --card: #fff; --border: #e0e0e0;
    --text: #1d1d1f; --sub: #6e6e73; --accent: #0071e3;
    --green: #34c759; --red: #ff3b30; --yellow: #ff9500;
    --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1c1c1e; --card:#2c2c2e; --border:#3a3a3c;
            --text:#f5f5f7; --sub:#98989d; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg);
         color: var(--text); min-height: 100vh; padding: 24px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: var(--sub); font-size: 14px; margin-bottom: 24px; }
  section { margin-bottom: 28px; }
  h2 { font-size: 13px; font-weight: 600; color: var(--sub);
       text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }

  .card { background: var(--card); border-radius: var(--radius);
          box-shadow: var(--shadow); padding: 16px; margin-bottom: 10px; }

  /* model card */
  .model-card { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .model-icon { font-size: 28px; flex-shrink: 0; }
  .model-info { flex: 1; min-width: 0; }
  .model-name { font-weight: 600; font-size: 15px; }
  .model-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .model-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .badge { display: inline-flex; align-items: center; gap: 4px;
           padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-online { background: rgba(52,199,89,.15); color: var(--green); }
  .badge-offline { background: rgba(255,59,48,.12); color: var(--red); }
  .badge-default { background: rgba(0,113,227,.12); color: var(--accent); }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  button { border: none; cursor: pointer; border-radius: 8px;
           font-size: 13px; font-weight: 500; padding: 7px 13px;
           transition: opacity .15s; }
  button:hover { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: rgba(0,0,0,.06); color: var(--text); }
  @media (prefers-color-scheme: dark) { .btn-ghost { background: rgba(255,255,255,.1); } }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: rgba(255,59,48,.12); color: var(--red); }

  /* test panel */
  .test-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  select, textarea, input[type=text], input[type=password] {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    padding: 9px 12px; width: 100%; outline: none;
    transition: border-color .15s;
  }
  select:focus, textarea:focus, input:focus { border-color: var(--accent); }
  textarea { min-height: 72px; resize: vertical; }
  select { cursor: pointer; }
  .label { font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .field { margin-bottom: 12px; }

  .response-box { background: var(--bg); border: 1px solid var(--border);
                  border-radius: 8px; padding: 12px; font-size: 14px;
                  line-height: 1.6; white-space: pre-wrap; min-height: 48px;
                  color: var(--text); margin-top: 12px; }
  .response-box.loading { color: var(--sub); font-style: italic; }
  .response-box.error { color: var(--red); }

  /* defaults row */
  .defaults-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .default-item { flex: 1; min-width: 200px; }

  /* key modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
             display: flex; align-items: center; justify-content: center;
             z-index: 100; padding: 20px; }
  .overlay.hidden { display: none; }
  .modal { background: var(--card); border-radius: var(--radius);
           padding: 24px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
  .modal h3 { font-size: 17px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  .spinner { display: inline-block; width: 14px; height: 14px;
             border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
             border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>🤖 模型管理</h1>
<p class="subtitle">管理本地和云端 AI 模型</p>

<section>
  <h2>默认模型</h2>
  <div class="card">
    <div class="defaults-row">
      <div class="default-item">
        <div class="label">文本默认</div>
        <select id="sel-text" onchange="saveDefaults()"></select>
      </div>
      <div class="default-item">
        <div class="label">视觉默认</div>
        <select id="sel-vision" onchange="saveDefaults()"></select>
      </div>
    </div>
    <div id="defaults-msg" style="font-size:12px;color:var(--sub);margin-top:8px;"></div>
  </div>
</section>

<section>
  <h2>本地模型</h2>
  <div id="local-models"></div>
</section>

<section>
  <h2>云端模型</h2>
  <div id="cloud-models"></div>
</section>

<section>
  <h2>快速测试</h2>
  <div class="card">
    <div class="test-row">
      <div style="flex:0 0 200px">
        <div class="label">选择模型</div>
        <select id="test-model"></select>
      </div>
      <div style="flex:1">
        <div class="label">提示词</div>
        <input type="text" id="test-prompt" value="你好，介绍一下自己" placeholder="输入测试内容">
      </div>
      <button class="btn-primary" onclick="runTest()" id="test-btn">发送</button>
    </div>
    <div id="test-response" class="response-box" style="display:none"></div>
  </div>
</section>

<!-- API Key Modal -->
<div class="overlay hidden" id="key-overlay" onclick="closeKeyModal(event)">
  <div class="modal">
    <h3 id="key-modal-title">配置 API Key</h3>
    <div class="field">
      <div class="label">API Key</div>
      <input type="password" id="key-input" placeholder="sk-..." autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="hideKeyModal()">取消</button>
      <button class="btn-primary" id="key-save-btn" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<script>
const API = '/api/models';
let allModels = [];
let defaults = { default_text: '', default_vision: '' };
let currentKeyModelId = '';

async function load() {
  const [statusRes, defaultsRes] = await Promise.all([
    fetch(`${API}/status`).then(r => r.json()),
    fetch(`${API}/defaults`).then(r => r.json()),
  ]);

  allModels = statusRes.models || [];
  defaults = defaultsRes;

  renderModels();
  renderSelects();
}

function renderModels() {
  const local = allModels.filter(m => m.provider === 'llama.cpp');
  const cloud = allModels.filter(m => m.provider !== 'llama.cpp');

  document.getElementById('local-models').innerHTML = local.map(modelCard).join('');
  document.getElementById('cloud-models').innerHTML = cloud.length
    ? cloud.map(modelCard).join('')
    : '<div class="card" style="color:var(--sub);font-size:14px">暂无云端模型（在 config/models.json 中添加）</div>';
}

function modelCard(m) {
  const isOnline = m.status === 'online';
  const statusBadge = `<span class="badge badge-${isOnline ? 'online' : 'offline'}">
    <span class="dot"></span>${isOnline ? '在线' : (m.provider === 'llama.cpp' ? '离线' : '未配置')}
  </span>`;
  const isDefText = m.id === defaults.default_text;
  const isDefVision = m.id === defaults.default_vision;
  const defBadges = [
    isDefText ? '<span class="badge badge-default">默认文本</span>' : '',
    isDefVision ? '<span class="badge badge-default">默认视觉</span>' : '',
  ].join('');

  const visionBadge = m.vision ? '<span style="font-size:11px;color:var(--sub)">👁 视觉</span>' : '';
  const meta = `${m.provider} · ${(m.context_length/1000).toFixed(0)}K ctx ${visionBadge}`;

  const keyBtn = m.provider !== 'llama.cpp'
    ? `<button class="btn-ghost btn-sm" onclick="showKeyModal('${m.id}','${m.name}')">🔑 配置 Key</button>`
    : '';
  const testBtn = `<button class="btn-ghost btn-sm" onclick="quickTest('${m.id}')">▶ 测试</button>`;

  return `<div class="card">
    <div class="model-card">
      <div class="model-icon">${m.provider === 'llama.cpp' ? '🖥' : '☁️'}</div>
      <div class="model-info">
        <div class="model-name">${m.name} ${statusBadge} ${defBadges}</div>
        <div class="model-meta">${meta}</div>
      </div>
      <div class="model-actions">${keyBtn}${testBtn}</div>
    </div>
  </div>`;
}

function renderSelects() {
  const opts = allModels.map(m =>
    `<option value="${m.id}" ${m.id === defaults.default_text ? 'selected' : ''}>${m.name}</option>`
  ).join('');
  const optsV = allModels.map(m =>
    `<option value="${m.id}" ${m.id === defaults.default_vision ? 'selected' : ''}>${m.name}</option>`
  ).join('');
  document.getElementById('sel-text').innerHTML = opts;
  document.getElementById('sel-vision').innerHTML = optsV;

  const testOpts = allModels.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('test-model').innerHTML = testOpts;
}

async function saveDefaults() {
  const text = document.getElementById('sel-text').value;
  const vision = document.getElementById('sel-vision').value;
  const res = await fetch(`${API}/defaults`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ default_text: text, default_vision: vision }),
  });
  const data = await res.json();
  defaults = data;
  document.getElementById('defaults-msg').textContent = '✓ 已保存';
  setTimeout(() => document.getElementById('defaults-msg').textContent = '', 2000);
  renderModels();
}

// Key modal
function showKeyModal(modelId, modelName) {
  currentKeyModelId = modelId;
  document.getElementById('key-modal-title').textContent = `配置 API Key — ${modelName}`;
  document.getElementById('key-input').value = '';
  document.getElementById('key-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('key-input').focus(), 50);
}
function hideKeyModal() {
  document.getElementById('key-overlay').classList.add('hidden');
}
function closeKeyModal(e) {
  if (e.target === document.getElementById('key-overlay')) hideKeyModal();
}
async function saveKey() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return;
  const btn = document.getElementById('key-save-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    await fetch(`${API}/${currentKeyModelId}/key`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: key }),
    });
    hideKeyModal();
    await load();
  } finally {
    btn.innerHTML = '保存';
    btn.disabled = false;
  }
}

// Test
async function runTest() {
  const modelId = document.getElementById('test-model').value;
  const prompt = document.getElementById('test-prompt').value.trim();
  if (!prompt) return;
  const box = document.getElementById('test-response');
  const btn = document.getElementById('test-btn');
  box.style.display = 'block';
  box.className = 'response-box loading';
  box.textContent = '正在请求…';
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/${modelId}/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    if (!res.ok) {
      box.className = 'response-box error';
      box.textContent = data.detail || '请求失败';
    } else {
      box.className = 'response-box';
      box.textContent = data.content;
    }
  } catch (e) {
    box.className = 'response-box error';
    box.textContent = String(e);
  } finally {
    btn.disabled = false;
  }
}

function quickTest(modelId) {
  document.getElementById('test-model').value = modelId;
  document.getElementById('test-prompt').value = '你好，介绍一下自己';
  document.getElementById('test-response').style.display = 'none';
  document.querySelector('section:last-of-type').scrollIntoView({ behavior: 'smooth' });
  setTimeout(() => runTest(), 300);
}

load();
</script>
</body>
</html>
