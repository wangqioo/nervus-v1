# NATS Server 配置 — Nervus 突触总线
# 边缘设备优化：低内存，JetStream 持久化

server_name: nervus-synapse

# 监听地址
host: 0.0.0.0
port: 4222

# HTTP 监控接口
http_port: 8222

# 日志
logtime: true
debug: false
trace: false

# 最大连接数（App 数量 * 2 + 系统服务）
max_connections: 100

# 最大消息大小 64MB（支持大图片 base64）
max_payload: 67108864

# ── JetStream ──────────────────────────────────
jetstream {
  store_dir: /data/jetstream

  # 内存存储限制（工作队列）
  max_memory_store: 256MB

  # 磁盘存储限制（持久化事件）
  max_file_store: 10GB
}

# ── 账户与权限 ──────────────────────────────────
# Arbor Core 可订阅和发布所有主题
# 各 App 只能发布 manifest 声明的主题
# 开发阶段暂时开放全局权限，生产时替换为 accounts 配置

# ── Stream 定义（通过 NATS CLI 初始化，此处注释说明） ──
# nervus-events stream:
#   subjects: media.> meeting.> health.> context.> memory.> knowledge.> system.> schedule.>
#   retention: limits
#   max_age: 30d
#   storage: file
#   replicas: 1
